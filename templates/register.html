<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Registration - College Portal</title>
    <style>
        /* Main Background Setup */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Glassmorphism Card Effect */
        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 400px;
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #fff;
            margin-bottom: 25px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Input Styling */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            outline: none;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fdbb2d;
            box-shadow: 0 0 10px rgba(253, 187, 45, 0.3);
        }

        /* Label for Role */
        label {
            color: #fff;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        /* Select Dropdown Styling */
        select option {
            background: #1a2a6c;
            color: #fff;
        }

        /* Flash Messages */
        .flash-msg {
            color: #ff9999;
            background: rgba(255, 0, 0, 0.15);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            border-left: 4px solid #ff4d4d;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #fdbb2d, #b21f1f);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        p {
            color: #eee;
            margin-top: 20px;
            font-size: 14px;
        }

        a {
            color: #fdbb2d;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Register</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" name="reg_no" placeholder="Registration / ID Number" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <div class="input-group">
                <label>Select Your Role:</label>
                <select name="role" required>
                    <option value="" disabled selected>Choose your role</option>
                    <option value="student">Student</option>
                    <option value="staff">Staff Member</option>
                    <option value="hod">Head of Department (HOD)</option>
                    <option value="principal">Principal</option>
                </select>
            </div>

            <button type="submit">Create Account</button>
        </form>
        
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>

</body>
</html>
